name: Release

on:
  push:
    tags:
      - 'v*'

env:
  GODOT_VERSION: '4.6.1'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # required by GitVersion — needs full history
          lfs: true

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.4.2
        with:
          versionSpec: '6.x'

      - name: Determine Version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.4.2

      - name: Download Godot
        run: |
          wget -q https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          unzip -q Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip
          mv Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64 godot
          chmod +x godot

      - name: Download Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          wget -q https://github.com/godotengine/godot-builds/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          unzip -q Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz
          mv templates/* ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable/

      - name: Import Project
        run: ./godot --headless --import --path ./ 2>&1 || true

      - name: Export Windows Client
        run: |
          mkdir -p ./build/windows
          ./godot --headless --export-release "Windows Desktop" ./build/windows/game.exe --path ./

      - name: Archive Build
        run: |
          zip -r ${{ github.workspace }}/gdmirage-windows-v${{ steps.gitversion.outputs.semVer }}.zip ./build/windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.gitversion.outputs.semVer }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ github.workspace }}/gdmirage-windows-v${{ steps.gitversion.outputs.semVer }}.zip
